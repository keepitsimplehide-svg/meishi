<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f7fbff">
  <title>小林 秀行｜デジタル名刺</title>
  <style>
    :root {
      --bg: #f6fafc;
      --card: rgba(255, 255, 255, 0.94);
      --text: #263238;
      --muted: #64727a;
      --accent: #4e8ca6;
      --accent-soft: #e9f4f8;
      --border: #dfecef;
      --shadow: 0 18px 45px rgba(55, 91, 108, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    html {
      -webkit-text-size-adjust: 100%;
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: max(20px, env(safe-area-inset-top)) 18px max(20px, env(safe-area-inset-bottom));
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
      background:
        radial-gradient(circle at 12% 10%, rgba(181, 224, 237, 0.6), transparent 28%),
        radial-gradient(circle at 88% 90%, rgba(220, 238, 226, 0.65), transparent 30%),
        var(--bg);
    }

    .card {
      width: min(100%, 430px);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 28px;
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .hero {
      position: relative;
      padding: 34px 28px 28px;
      text-align: center;
      background: linear-gradient(180deg, #ffffff 0%, #f6fbfd 100%);
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -38px;
      top: -42px;
      width: 130px;
      height: 130px;
      border-radius: 50%;
      background: rgba(188, 224, 235, 0.35);
    }

    .avatar {
      position: relative;
      z-index: 1;
      width: 92px;
      height: 92px;
      margin: 0 auto 18px;
      display: grid;
      place-items: center;
      border: 6px solid #fff;
      border-radius: 50%;
      background: linear-gradient(145deg, #dff1f7, #eef8f4);
      box-shadow: 0 10px 24px rgba(74, 128, 151, 0.18);
      font-size: 42px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 8vw, 36px);
      letter-spacing: 0.08em;
      line-height: 1.25;
    }

    .job {
      margin: 10px 0 0;
      color: var(--accent);
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .message {
      margin: 20px auto 0;
      padding: 12px 16px;
      border: 1px solid #d7eaf0;
      border-radius: 16px;
      color: #41636f;
      background: #eff8fb;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.6;
    }

    .content {
      padding: 24px;
    }

    .section {
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: #fff;
    }

    .section + .section {
      margin-top: 14px;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 9px;
      margin: 0 0 12px;
      color: #45616c;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.1em;
    }

    .hobbies {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .tag {
      padding: 9px 13px;
      border-radius: 999px;
      color: #496069;
      background: var(--accent-soft);
      font-size: 14px;
      font-weight: 700;
    }

    .contact-list {
      display: grid;
      gap: 10px;
    }

    .contact {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      padding: 13px 14px;
      border: 1px solid #e3eef1;
      border-radius: 15px;
      color: var(--text);
      background: #fbfdfe;
      text-decoration: none;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .contact:active {
      transform: scale(0.985);
    }

    @media (hover: hover) {
      .contact:hover {
        transform: translateY(-2px);
        border-color: #c9e1e8;
        box-shadow: 0 8px 18px rgba(72, 117, 136, 0.1);
      }
    }

    .icon {
      flex: 0 0 auto;
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background: var(--accent-soft);
      font-size: 19px;
    }

    .contact-text {
      min-width: 0;
    }

    .label {
      display: block;
      margin-bottom: 2px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .value {
      display: block;
      overflow-wrap: anywhere;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.5;
    }

    .footer {
      padding: 0 24px 24px;
      color: #85939a;
      text-align: center;
      font-size: 11px;
      letter-spacing: 0.06em;
    }

    @media (max-width: 360px) {
      .hero {
        padding-inline: 20px;
      }

      .content {
        padding: 18px;
      }

      .section {
        padding: 16px;
      }

      .footer {
        padding-inline: 18px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        scroll-behavior: auto !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <main class="card" aria-label="小林秀行のデジタル名刺">
    <section class="hero">
      <div class="avatar" aria-hidden="true">⚓</div>
      <h1>小林　秀行</h1>
      <p class="job">ＪＭＳＤＦ</p>
      <p class="message">Fujitsu 出港（出向）中！</p>
    </section>

    <div class="content">
      <section class="section" aria-labelledby="hobby-title">
        <h2 class="section-title" id="hobby-title"><span aria-hidden="true">🌿</span> 趣味</h2>
        <div class="hobbies">
          <span class="tag">🍳 料理</span>
          <span class="tag">🎮 コンソールゲーム</span>
        </div>
      </section>

      <section class="section" aria-labelledby="contact-title">
        <h2 class="section-title" id="contact-title"><span aria-hidden="true">✉️</span> 連絡先</h2>
        <div class="contact-list">
          <a class="contact" href="mailto:hideyuki.ko@icloud.com">
            <span class="icon" aria-hidden="true">📧</span>
            <span class="contact-text">
              <span class="label">MAIL</span>
              <span class="value">hideyuki.ko@icloud.com</span>
            </span>
          </a>
          <a class="contact" href="https://www.instagram.com/hk208147/" target="_blank" rel="noopener noreferrer">
            <span class="icon" aria-hidden="true">📷</span>
            <span class="contact-text">
              <span class="label">INSTAGRAM</span>
              <span class="value">@hk208147</span>
            </span>
          </a>
        </div>
      </section>
    </div>

    <footer class="footer">DIGITAL BUSINESS CARD</footer>
  </main>

  <script>
    document.querySelectorAll('.contact').forEach((link) => {
      link.addEventListener('click', () => {
        link.classList.add('is-tapped');
        window.setTimeout(() => link.classList.remove('is-tapped'), 180);
      });
    });
  </script>
</body>
</html>
